<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" style="background:#0f172a; font-family:system-ui, -apple-system, sans-serif;">
  <text x="400" y="45" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="bold">RAG Architecture Benchmark: GitHub Models (GPT-4o)</text>
  <text x="400" y="75" text-anchor="middle" fill="#94a3b8" font-size="14">Naive Single-Pass RAG vs Multi-Agent Sequential RAG</text>

  <!-- Y-Axis Grid -->
  <line x1="100" y1="380" x2="720" y2="380" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="300" x2="720" y2="300" stroke="#334155" stroke-dasharray="4" stroke-width="1"/>
  <line x1="100" y1="220" x2="720" y2="220" stroke="#334155" stroke-dasharray="4" stroke-width="1"/>
  <line x1="100" y1="140" x2="720" y2="140" stroke="#334155" stroke-dasharray="4" stroke-width="1"/>

  <text x="85" y="385" text-anchor="end" fill="#64748b" font-size="12">0%</text>
  <text x="85" y="305" text-anchor="end" fill="#64748b" font-size="12">33%</text>
  <text x="85" y="225" text-anchor="end" fill="#64748b" font-size="12">66%</text>
  <text x="85" y="145" text-anchor="end" fill="#64748b" font-size="12">100%</text>

  <!-- Group 1: Citation Precision -->
  <text x="260" y="415" text-anchor="middle" fill="#cbd5e1" font-size="15" font-weight="bold">Citation Precision</text>
  <!-- Naive Bar -->
  <rect x="170" y="380.0" width="70" height="0.0" rx="6" fill="#ef4444"/>
  <text x="205" y="370.0" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">0%</text>
  <!-- Multi-Agent Bar -->
  <rect x="250" y="140.0" width="70" height="240.0" rx="6" fill="#10b981"/>
  <text x="285" y="130.0" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">100%</text>

  <!-- Group 2: Groundedness -->
  <text x="560" y="415" text-anchor="middle" fill="#cbd5e1" font-size="15" font-weight="bold">Groundedness (Anti-Hallucination)</text>
  <!-- Naive Bar -->
  <rect x="470" y="188.0" width="70" height="192.0" rx="6" fill="#ef4444"/>
  <text x="505" y="178.0" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">80%</text>
  <!-- Multi-Agent Bar -->
  <rect x="550" y="140.0" width="70" height="240.0" rx="6" fill="#10b981"/>
  <text x="585" y="130.0" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">100%</text>

  <!-- Legend -->
  <rect x="250" y="455" width="18" height="18" rx="4" fill="#ef4444"/>
  <text x="275" y="469" fill="#94a3b8" font-size="13">Naive Single-Pass RAG</text>
  <rect x="440" y="455" width="18" height="18" rx="4" fill="#10b981"/>
  <text x="465" y="469" fill="#94a3b8" font-size="13">Multi-Agent RAG (GitHub Models)</text>
</svg>